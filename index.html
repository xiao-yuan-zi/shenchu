<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神厨小园子 | Culinary Garden</title>
    <style>
        /* ================= 1. 新中式高级极简主题 ================= */
        :root {
            --bg-base: #f7f6f2;         /* 宣纸暖白底色 */
            --card-bg: rgba(255, 255, 255, 0.85); /* 半透明纯白卡片 */
            --text-main: #2c2c2c;       /* 柔和的深墨色 (高级黑灰调) */
            --text-muted: #8c8c88;      /* 浅茶灰色 */
            --badge-color: #d35400;     /* 仅用于右上角购物车小红点的颜色 */
            --border-color: rgba(0,0,0,0.06); 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            
            background-color: var(--bg-base);
            /* 高级光影背景 */
            background-image: 
                linear-gradient(rgba(247, 246, 242, 0.85), rgba(247, 246, 242, 0.85)),
                url('https://images.unsplash.com/photo-1579562919904-8cb96b528b17?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .serif-text, h1, h2, h3, .cat-btn, .price {
            font-family: "Noto Serif SC", "Songti SC", "STSong", "Times New Roman", serif;
            font-weight: 600;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* ================= 2. 顶部导航栏 ================= */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(247, 246, 242, 0.65);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .header-center { text-align: center; }
        .header-center h1 { margin: 0; font-size: 1.3rem; letter-spacing: 3px; color: var(--text-main); }
        .header-center .eng-name { font-size: 0.65rem; letter-spacing: 3px; color: var(--text-muted); margin-top: 4px; font-family: sans-serif; font-weight: 500;}

        .header-btn {
            background: transparent; border: none; cursor: pointer;
            color: var(--text-main); font-size: 22px; 
            width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;
            transition: opacity 0.2s;
        }
        .header-btn:active { opacity: 0.5; }

        .cart-wrapper { position: relative; }
        .cart-badge {
            position: absolute; top: -2px; right: -5px;
            background: var(--badge-color); color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; font-weight: bold;
            box-shadow: 0 2px 5px rgba(211, 84, 0, 0.3);
        }

        /* ================= 3. 极简侧边栏 ================= */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 280px; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid var(--border-color); overflow-y: auto; padding-top: 60px;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-close {
            position: absolute; top: 15px; right: 20px; font-size: 24px;
            color: var(--text-muted); cursor: pointer; background: none; border: none;
        }

        .category-menu { padding: 0 24px; }
        .cat-btn {
            width: 100%; text-align: left; background: none; border: none;
            color: var(--text-main); font-size: 1.3rem; padding: 18px 0;
            border-bottom: 1px solid var(--border-color); cursor: pointer;
            letter-spacing: 1px;
        }
        .subcat-list { display: none; padding-left: 15px; margin: 0; list-style: none; }
        .subcat-list.active { display: block; }
        .subcat-list li {
            padding: 12px 0; color: var(--text-muted); cursor: pointer; font-size: 0.95rem;
        }
        .subcat-list li:hover { color: var(--text-main); }

        /* ================= 4. 主菜单网格 ================= */
        .main-content {
            padding: 24px; max-width: 1000px; margin: 0 auto; padding-bottom: 80px;
        }
        
        .section-title {
            color: var(--text-main); font-size: 1.8rem;
            padding-bottom: 15px; margin: 40px 0 20px 0; border-bottom: 1px solid var(--border-color);
        }
        .sub-title { color: var(--text-main); font-size: 1.2rem; margin: 30px 0 20px 0; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .menu-item {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); transition: all 0.3s ease;
            display: flex; flex-direction: column;
        }
        .menu-item:hover { box-shadow: 0 15px 40px rgba(0,0,0,0.08); transform: translateY(-3px); }
        .menu-item img { width: 100%; height: 220px; object-fit: cover; }
        
        .item-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .item-info h3 { margin: 0 0 8px 0; font-size: 1.3rem; letter-spacing: 1px;}
        .item-info p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; flex-grow: 1; margin: 0 0 16px 0;}
        
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--text-main); font-size: 1.4rem; }
        .price::before { content: "￥"; font-size: 0.9rem; margin-right: 2px;}
        
        .add-btn {
            background: var(--text-main); color: #fff;
            border: none; padding: 8px 20px; font-size: 0.9rem;
            border-radius: 50px; cursor: pointer; transition: opacity 0.2s;
            letter-spacing: 1px;
        }
        .add-btn:hover { opacity: 0.85; }

        /* ================= 5. 购物车抽屉 ================= */
        .cart-drawer {
            position: fixed; top: 0; right: -420px; width: 100%; max-width: 400px; height: 100%;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: saturate(180%) blur(20px);
            z-index: 1000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 40px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            border-left: 1px solid var(--border-color);
        }
        .cart-drawer.open { right: 0; }
        
        .cart-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-header h2 { margin: 0; color: var(--text-main); font-size: 1.4rem; letter-spacing: 1px;}
        
        .cart-items { padding: 24px; overflow-y: auto; flex-grow: 1; }
        .cart-item { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; }
        .cart-item-title { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.1rem; font-family: "Noto Serif SC", serif; font-weight: 600;}
        .cart-item-desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px; }
        .cart-controls { display: flex; justify-content: space-between; align-items: center; }
        
        .qty-control { display: flex; align-items: center; gap: 12px; background: #f0efe9; border-radius: 50px; padding: 4px; }
        .qty-btn { background: white; color: var(--text-main); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; padding: 0;}
        .edit-item-btn { background: none; border: none; color: var(--text-muted); text-decoration: underline; cursor: pointer; font-size: 0.85rem;}

        .cart-footer { padding: 24px; border-top: 1px solid var(--border-color); background: rgba(255,255,255,0.9); }
        .total-price { display: flex; justify-content: space-between; font-size: 1.3rem; margin-bottom: 20px; font-family: "Noto Serif SC", serif; font-weight: 600;}
        .checkout-btn {
            width: 100%; background: var(--text-main); color: #fff; border: none;
            padding: 16px; font-size: 1.1rem; border-radius: 12px; cursor: pointer; letter-spacing: 2px; font-family: "Noto Serif SC", serif; font-weight: 600;
            transition: opacity 0.2s;
        }
        .checkout-btn:hover { opacity: 0.9; }

        /* ================= 6. 高级弹窗 ================= */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 950;
        }
        .overlay.show { display: block; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -40%);
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
            width: 90%; max-width: 380px; border-radius: 20px;
            padding: 30px; z-index: 1001; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.5);
            max-height: 85vh; overflow-y: auto;
        }
        .modal.show { display: block; transform: translate(-50%, -50%); opacity: 1; }
        
        .modal h2 { margin-top: 0; color: var(--text-main); margin-bottom: 24px; font-size: 1.4rem;}
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .radio-group input[type="radio"] { display: none; }
        .radio-group label {
            background: #f0efe9; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; color: var(--text-main);
        }
        .radio-group input[type="radio"]:checked + label {
            background: var(--text-main); color: white;
        }
        
        input[type="text"], textarea {
            width: 100%; padding: 14px; box-sizing: border-box; background: #f0efe9;
            border: 1px solid transparent; color: var(--text-main); border-radius: 12px; font-size: 1rem;
            transition: all 0.2s; font-family: inherit;
        }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--text-muted); background: #fff; }
        
        .modal-actions { display: flex; gap: 12px; margin-top: 30px; }
        .btn-cancel { flex: 1; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 14px; border-radius: 12px; cursor: pointer; letter-spacing: 1px;}
        .btn-confirm { flex: 2; background: var(--text-main); border: none; color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; letter-spacing: 1px; font-family: "Noto Serif SC", serif; font-weight: 600; transition: opacity 0.2s;}
        .btn-confirm:hover { opacity: 0.9; }

        /* 弹窗内的数量选择器 */
        .modal-qty-row {
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 15px; border-top: 1px solid var(--border-color); margin-top: 20px;
        }
        .modal-qty-row label { margin-bottom: 0; font-weight: 600; color: var(--text-main); }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
        }
    </style>
</head>

    <div class="main-content" id="menu"></div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <div class="cart-drawer" id="cartDrawer">

            <button class="sidebar-close" style="position:static;" onclick="toggleCart()">✕</button>

    <!-- 动态定制菜品弹窗 -->
    <div class="modal" id="itemModal">
        <h2 class="serif-text" id="modalTitle">定制菜单</h2>
        <input type="hidden" id="currentItemId">
        <input type="hidden" id="editingCartId">
        
        <!-- JavaScript会自动把定制选项插入到这里 -->
        <div id="dynamicOptionsContainer"></div>

        <div class="form-group">
            <label>特殊备注 (选填)</label>
            <textarea id="itemRemarks" rows="2" placeholder="例如：不要葱姜蒜..."></textarea>
        </div>

        <div class="modal-qty-row">
            <label>点餐数量</label>
            <div class="qty-control" style="background: transparent; padding: 0;">
                <button type="button" class="qty-btn" onclick="changeModalQty(-1)" style="background: #f0efe9;">-</button>
                <span id="modalQtyDisplay" style="font-weight:600; width: 30px; text-align:center; font-size: 1.1rem;">1</span>
                <button type="button" class="qty-btn" onclick="changeModalQty(1)" style="background: #f0efe9;">+</button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeAllModals()">取消</button>
            <button class="btn-confirm" onclick="saveToCart()">确认</button>
        </div>
    </div>

    <div class="modal" id="checkoutModal">
        <h2 class="serif-text">确认下单</h2>
        
        <form id="orderForm" action="https://formspree.io/f/xkoqrlnz" method="POST">
            <textarea name="完整订单详情" id="finalOrderDetails" style="display: none;"></textarea>
            <input type="hidden" name="订单总价" id="finalOrderTotal">

            <div class="form-group">
                <label>您的称呼</label>
                <input type="text" name="顾客名字" required placeholder="如：张先生">
            </div>
            <div class="form-group">
                <label>联系电话</label>
                <input type="text" name="电话号码" required placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label>送餐地址或桌号</label>
                <input type="text" name="地址或桌号" required placeholder="如：3号桌 或 XX小区...">
            </div>
            
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeAllModals()">返回</button>
                <button type="submit" class="btn-confirm">提交订单</button>
            </div>
        </form>

            },
            {

                customOptions: [
                ]
            },
            { 
                id: 25, name: "韩风海鲜泡菜饼", price: 78, desc: "外边缘焦脆，内里软糯酸辣，搭配海鲜的韩式经典铁板风味。", img: "./images/paocaibing.jpg", category: "日韩料理", subcategory: "主菜",
                customOptions: [
                    { title: "食材", choices: ["时令食材"] },
                    { title: "忌口", choices: ["如有忌口或过敏请备注"] }
                ]
            }

        ];

        let cart = [];
        let modalCurrentQty = 1;

        // ================= 初始化核心更新：全动态读取分类 =================
        const menuContainer = document.getElementById('menu');
        const navContainer = document.getElementById('categoryMenu');

        function initApp() {
            // 1. 自动从数据中提取所有独立的主分类（不会重复）
            const categories = [...new Set(menuData.map(item => item.category))];

            categories.forEach((cat, index) => {
                const catItems = menuData.filter(item => item.category === cat);
                if (catItems.length === 0) return;

                // 侧边栏按钮
                const catBtn = document.createElement('button');
                catBtn.className = 'cat-btn serif-text';
                catBtn.innerText = cat;
                catBtn.onclick = function() {
                    const subList = this.nextElementSibling;
                    subList.classList.toggle('active');
                };
                navContainer.appendChild(catBtn);

                const subList = document.createElement('ul');
                subList.className = 'subcat-list';
                if(index === 0) subList.classList.add('active'); 
                
                // 主内容分类大标题
                menuContainer.innerHTML += `<h2 class="section-title serif-text" id="cat-${cat}">${cat}</h2>`;

                // 2. 自动提取当前主分类下的所有子分类
                const subcats = [...new Set(catItems.map(item => item.subcategory))];
                // 检查是不是真的有子分类（防止有的菜没写）
                const hasRealSubcats = subcats.some(sub => sub && sub.trim() !== "");

                if (hasRealSubcats) {
                    subcats.forEach(subCat => {
                        const subItems = catItems.filter(item => item.subcategory === subCat);
                        if (subItems.length === 0) return;

                        // 如果某个菜品没写子分类，归为"其他"
                        const displaySubCat = subCat || "其他"; 

                        // 唯一的ID，防止中文冲突
                        const anchorId = `subcat-${cat}-${displaySubCat}`;

                        subList.innerHTML += `<li onclick="scrollToSection('${anchorId}')">${displaySubCat}</li>`;
                        menuContainer.innerHTML += `<h3 class="sub-title serif-text" id="${anchorId}">${displaySubCat}</h3>`;
                        renderCards(subItems);
                    });
                } else {
                    // 如果这个大类完全没有任何子分类，就直接显示
                    subList.innerHTML += `<li onclick="scrollToSection('cat-${cat}')">全部${cat}</li>`;
                    renderCards(catItems);
                }
                navContainer.appendChild(subList);
            });
        }

        function renderCards(items) {
            const grid = document.createElement('div');
            grid.className = 'menu-grid';
            items.forEach(item => {
                grid.innerHTML += `
                    <div class="menu-item">
                        <!-- 【提速黑科技】加上了 loading="lazy"，不在屏幕里的图片不会提前下载，网页秒开！ -->
                        <img src="${item.img}" loading="lazy" alt="${item.name}">
                        <div class="item-info">
                            <h3 class="serif-text">${item.name}</h3>
                            <p>${item.desc}</p>
                            <div class="price-row">
                                <span class="price serif-text">${item.price}</span>
                                <button class="add-btn serif-text" onclick="openItemModal(${item.id})">点选</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            menuContainer.appendChild(grid);
        }

        // ================= 交互与购物车逻辑 =================
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleCart() { document.getElementById('cartDrawer').classList.toggle('open'); updateCartUI(); }
        function scrollToSection(id) {
            const yOffset = -80;
            const element = document.getElementById(id);
            if(element) {
                const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
                window.scrollTo({top: y, behavior: 'smooth'});
            }
            if(window.innerWidth <= 768) toggleSidebar();
        }

        const overlay = document.getElementById('overlay');
        const itemModal = document.getElementById('itemModal');
        const checkoutModal = document.getElementById('checkoutModal');

        function closeAllModals() {
            overlay.classList.remove('show');
            setTimeout(() => {
                itemModal.classList.remove('show');
                checkoutModal.classList.remove('show');
            }, 50);
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('cartDrawer').classList.remove('open');
        }

        function changeModalQty(delta) {
            modalCurrentQty += delta;
            if (modalCurrentQty < 1) modalCurrentQty = 1;
            document.getElementById('modalQtyDisplay').innerText = modalCurrentQty;
        }

        function openItemModal(foodId, cartId = null) {
            const food = menuData.find(f => f.id === foodId);
            document.getElementById('modalTitle').innerText = cartId ? `修改内容` : `${food.name}`;
            document.getElementById('currentItemId').value = food.id;
            document.getElementById('editingCartId').value = cartId || "";
            
            let cartItem = null;
            if (cartId) {
                cartItem = cart.find(c => c.cartId === cartId);
                document.getElementById('itemRemarks').value = cartItem.remarks;
                modalCurrentQty = cartItem.quantity;
                document.querySelector('#itemModal .btn-confirm').innerText = "保存修改";
            } else {
                document.getElementById('itemRemarks').value = "";
                modalCurrentQty = 1;
                document.querySelector('#itemModal .btn-confirm').innerText = "加入菜单";
            }
            
            document.getElementById('modalQtyDisplay').innerText = modalCurrentQty;

            const optionsContainer = document.getElementById('dynamicOptionsContainer');
            optionsContainer.innerHTML = ''; 

            if (food.customOptions && food.customOptions.length > 0) {
                food.customOptions.forEach((optGroup, groupIndex) => {
                    let html = `<div class="form-group"><label>${optGroup.title}</label><div class="radio-group">`;
                    
                    optGroup.choices.forEach((choice, choiceIndex) => {
                        let isChecked = false;
                        if (cartItem && cartItem.selectedOptions && cartItem.selectedOptions[optGroup.title] === choice) {
                            isChecked = true;
                        } else if (!cartItem && choiceIndex === 0) {
                            isChecked = true; 
                        }
                        
                        const inputId = `opt_${groupIndex}_${choiceIndex}`;
                        const inputName = `opt_${groupIndex}`;
                        
                        html += `
                            <input type="radio" id="${inputId}" name="${inputName}" value="${choice}" ${isChecked ? 'checked' : ''}>
                            <label for="${inputId}">${choice}</label>
                        `;
                    });
                    
                    html += `</div></div>`;
                    optionsContainer.innerHTML += html;
                });
            }

            itemModal.style.display = 'block';
            overlay.classList.add('show');
            setTimeout(() => itemModal.classList.add('show'), 10);
        }

        function saveToCart() {
            const foodId = parseInt(document.getElementById('currentItemId').value);
            const editingCartId = document.getElementById('editingCartId').value;
            const remarks = document.getElementById('itemRemarks').value;
            const food = menuData.find(f => f.id === foodId);

            let selectedOptions = {};
            let optionsDisplayArr = []; 

            if (food.customOptions && food.customOptions.length > 0) {
                food.customOptions.forEach((optGroup, groupIndex) => {
                    const checkedRadio = document.querySelector(`input[name="opt_${groupIndex}"]:checked`);
                    if (checkedRadio) {
                        selectedOptions[optGroup.title] = checkedRadio.value;
                        optionsDisplayArr.push(checkedRadio.value);
                    }
                });
            }
            const optionsDisplayStr = optionsDisplayArr.join(', ');

            if (editingCartId) {
                const itemIndex = cart.findIndex(c => c.cartId == editingCartId);
                cart[itemIndex].quantity = modalCurrentQty;
                cart[itemIndex].remarks = remarks;
                cart[itemIndex].selectedOptions = selectedOptions;
                cart[itemIndex].optionsDisplayStr = optionsDisplayStr;
            } else {
                cart.push({
                    cartId: Date.now(),
                    foodId: food.id,
                    name: food.name,
                    price: food.price,
                    quantity: modalCurrentQty,
                    remarks: remarks,
                    selectedOptions: selectedOptions,
                    optionsDisplayStr: optionsDisplayStr
                });
            }
            
            closeAllModals();
            updateCartUI();
            
            const cartBtn = document.querySelector('.cart-wrapper .header-btn');
            cartBtn.style.transform = 'scale(1.2)';
            setTimeout(() => cartBtn.style.transform = 'scale(1)', 200);
        }

        function changeQty(cartId, delta) {
            const item = cart.find(c => c.cartId === cartId);
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(c => c.cartId !== cartId);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            const badge = document.getElementById('cartBadge');
            
            container.innerHTML = "";
            let total = 0;
            let totalQty = 0;

            if (cart.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-muted); margin-top:60px;'>您的菜单尚空</p>";
                badge.style.display = 'none'; 
            } else {
                badge.style.display = 'flex';
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    totalQty += item.quantity;
                    
                    let descText = item.optionsDisplayStr;
                    if (item.remarks) {
                        descText = descText ? `${descText} | 备注: ${item.remarks}` : `备注: ${item.remarks}`;
                    }

                    container.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-title">
                                <span>${item.name}</span>
                                <span>￥${item.price * item.quantity}</span>
                            </div>
                            <div class="cart-item-desc">${descText}</div>
                            <div class="cart-controls">
                                <button class="edit-item-btn" onclick="openItemModal(${item.foodId}, ${item.cartId})">编辑内容</button>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="changeQty(${item.cartId}, -1)">-</button>
                                    <span style="font-weight:600; width: 24px; text-align:center;">${item.quantity}</span>
                                    <button class="qty-btn" onclick="changeQty(${item.cartId}, 1)">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            totalEl.innerText = "￥" + total;
            badge.innerText = totalQty;
        }

        function openCheckoutModal() {
            if (cart.length === 0) {
                alert("请先添加菜品到菜单哦！");
                return;
            }
            document.getElementById('cartDrawer').classList.remove('open');
            
            let orderString = "【顾客订单详情】\n\n";
            let total = 0;
            cart.forEach(item => {
                orderString += `▶ ${item.name} x${item.quantity} (￥${item.price * item.quantity})\n`;
                if(item.optionsDisplayStr) orderString += `   选项: ${item.optionsDisplayStr}\n`;
                if(item.remarks) orderString += `   备注: ${item.remarks}\n`;
                orderString += `--------------------\n`;
                total += item.price * item.quantity;
            });
            orderString += `\n【合计金额】: ￥${total}`;

            document.getElementById('finalOrderDetails').value = orderString;
            document.getElementById('finalOrderTotal').value = "￥" + total;

            checkoutModal.style.display = 'block';
            overlay.classList.add('show');
            setTimeout(() => checkoutModal.classList.add('show'), 10);
        }

        window.onload = initApp;

    </script>
</body>
